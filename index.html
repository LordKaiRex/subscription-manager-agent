<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubManager - Subscription Agent</title>
  
  <!-- Tailwind CSS v3 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Circle Web SDK: pure browser postMessage implementation (CJS package cannot load in browser) -->

  <style>

    }
    .glass-card {

    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);

    .scrollbar-thin::-webkit-scrollbar-thumb:hover {

    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            arc: '#00D1FF',
            arcDark: '#0083A0',
            panelBg: '#111827'
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="antialiased min-h-screen flex flex-col items-center py-8 px-4">
  <div id="root" class="w-full max-w-5xl"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Initialise circleDeviceId lazily to avoid any top-level side-effects
    // that could trigger a React hydration mismatch (#418)
    let circleDeviceId = null;
    const getDeviceId = () => {
      if (circleDeviceId) return circleDeviceId;
      circleDeviceId = sessionStorage.getItem('circle_device_id');
      if (!circleDeviceId) {
        circleDeviceId = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
          (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
        sessionStorage.setItem('circle_device_id', circleDeviceId);
      }
      return circleDeviceId;
    };

    const AGENTIC_COMMERCE_ADDRESS = '0x0747EEf0706327138c69792bF28Cd525089e4583';
    const REPUTATION_REGISTRY_ADDRESS = '0x8004B663056A597Dffe9eCcC1965A193B7388713';
    const RPC_URL = 'https://rpc.testnet.arc.network';
    const API_URL = '';

    // Module-level variables so SDK callbacks always have access to the
    // latest credentials even after async re-entries (fixes scope loss).
    let currentUserToken = null;
    let currentEncryptionKey = null;
    let currentDeviceToken = null;

    // React Error Boundary to catch render failures
    class ErrorBoundary extends React.Component {
      state = { error: null };
      static getDerivedStateFromError(error) { 
        return { error: error.message || String(error) }; 
      }
      componentDidCatch(error, errorInfo) {
        console.error("ErrorBoundary caught an uncaught error:", error, errorInfo);
      }
      render() {
        if (this.state.error) {
          return React.createElement('div', 
            { style: { color: '#ff6b6b', padding: '2.5rem', background: '#111827', borderRadius: '1rem', border: '1px solid rgba(255, 107, 107, 0.2)', fontFamily: 'monospace', maxWidth: '600px', margin: '2rem auto' } },
            React.createElement('h2', { style: { marginTop: 0 } }, '❌ SubManager Dashboard Crash'),
            React.createElement('pre', { style: { whiteSpace: 'pre-wrap', background: 'rgba(0,0,0,0.2)', padding: '1rem', borderRadius: '0.5rem' } }, this.state.error),
            React.createElement('button', { 
              onClick: () => window.location.reload(),
              style: { background: '#00D1FF', color: '#000', border: 'none', padding: '0.5rem 1rem', borderRadius: '0.25rem', cursor: 'pointer', fontWeight: 'bold', marginTop: '1rem' }
            }, 'Reload Dashboard')
          );
        }
        return this.props.children;
      }
    }




    const POPULAR_SERVICES = [
      { name: 'Netflix', cost: 15.99, color: 'hover:border-red-500/40 text-red-400 bg-red-500/5' },
      { name: 'Spotify', cost: 9.99, color: 'hover:border-green-500/40 text-green-400 bg-green-500/5' },
      { name: 'ChatGPT Plus', cost: 20.00, color: 'hover:border-emerald-500/40 text-emerald-400 bg-emerald-500/5' },
      { name: 'Amazon Prime', cost: 14.99, color: 'hover:border-amber-500/40 text-amber-400 bg-amber-500/5' },
      { name: 'YouTube Premium', cost: 13.99, color: 'hover:border-red-600/40 text-red-500 bg-red-600/5' },
      { name: 'Apple TV+', cost: 9.99, color: 'hover:border-slate-300/40 text-slate-300 bg-slate-300/5' },
      { name: 'Disney+', cost: 10.99, color: 'hover:border-blue-400/40 text-blue-400 bg-blue-400/5' },
      { name: 'Notion', cost: 16.00, color: 'hover:border-stone-400/40 text-stone-300 bg-stone-400/5' },
      { name: 'GitHub Pro', cost: 4.00, color: 'hover:border-purple-400/40 text-purple-400 bg-purple-400/5' },
      { name: 'Figma', cost: 15.00, color: 'hover:border-pink-500/40 text-pink-400 bg-pink-500/5' },
    ];

    const truncateAddress = (addr) => addr ? `${addr.substring(0, 6)}...${addr.substring(addr.length - 4)}` : '';

    function App() {
      // Configuration state resolved dynamically from API
      const [agentConfig, setAgentConfig] = useState({ 
        agentId: '...', 
        ownerAddress: '...',
        validatorAddress: '...'
      });

      // App Configs from backend auth/config
      const [appConfig, setAppConfig] = useState({ appId: '', apiKey: '', googleClientId: '' });

      // Circle Sign In States (State A / State B)
      const [circleUser, setCircleUser] = useState(() => {
        // Session Persistence using sessionStorage
        const stored = sessionStorage.getItem('submanager_circle_user');
        return stored ? JSON.parse(stored) : null; 
      });
      const [walletBalance, setWalletBalance] = useState('0.00');
      const [showLoginModal, setShowLoginModal] = useState(false);

      // 4-Step wizard states
      const [wizardStep, setWizardStep] = useState(1); // 1: Email, 2: Setup (OTP/PIN), 3: Created, 4: Fund
      const [wizardMode, setWizardMode] = useState('create'); // 'create' | 'signin'
      const [wizardEmail, setWizardEmail] = useState('');
      const [wizardError, setWizardError] = useState(null);
      const [isWizardLoading, setIsWizardLoading] = useState(false);
      
      // Temporary auth credentials returned by Step 1
      const [wizardUserToken, setWizardUserToken] = useState('');
      const [wizardEncryptionKey, setWizardEncryptionKey] = useState('');
      const [wizardChallengeId, setWizardChallengeId] = useState('');
      const [wizardAppId, setWizardAppId] = useState('');
      const [wizardWalletAddress, setWizardWalletAddress] = useState('');

      // Collapsible panel state
      const [isKeysExpanded, setIsKeysExpanded] = useState(true);
      const [ownerKeyInput, setOwnerKeyInput] = useState('');
      const [validatorKeyInput, setValidatorKeyInput] = useState('');
      const [isSavingKeys, setIsSavingKeys] = useState(false);

      const [subscriptions, setSubscriptions] = useState([]);
      const [jobs, setJobs] = useState([]);
      const [reputation, setReputation] = useState({ score: 0, tag: 'Loading...' });
      const [notif, setNotif] = useState(null);

      // Forms
      const [newSub, setNewSub] = useState({ name: '', cost: '', renewalDate: '' });
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({ name: '', cost: '', renewalDate: '' });
      
      // Loading indicators
      const [isTriggeringCheck, setIsTriggeringCheck] = useState(false);
      const [cancellingSubs, setCancellingSubs] = useState({});

      const showNotification = (message, type = 'success', linkText = '', linkUrl = '') => {
        setNotif({ message, type, linkText, linkUrl });
        setTimeout(() => setNotif(null), 10000);
      };

      // Load Circle SDK dynamically after React mounts (avoids error #418 hydration mismatch)
      useEffect(() => {
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/@circle-fin/w3s-pw-web-sdk/dist/umd/index.js';
        script.async = true;
        script.onload = () => {
          console.log('Circle SDK loaded dynamically:', typeof window.W3SSdk);
        };
        document.body.appendChild(script);
        return () => {
          if (document.body.contains(script)) {
            document.body.removeChild(script);
          }
        };
      }, []);

      // Fetch app configurations on startup
      useEffect(() => {
        const fetchConfig = async () => {
          try {
            const res = await fetch(`${API_URL}/auth/config`);
            if (res.ok) {
              const data = await res.json();
              setAppConfig(data);
            }
          } catch (e) {
            console.error("Failed to load auth configs:", e);
          }
        };
        fetchConfig();
      }, []);

      // Fetch Circle Wallet USDC Balance
      useEffect(() => {
        const fetchBalance = async () => {
          if (!circleUser || !circleUser.walletAddress) {
            setWalletBalance('0.00');
            return;
          }
          try {
            const clean = circleUser.walletAddress.toLowerCase().replace('0x', '');
            const callData = '0x70a08231' + clean.padStart(64, '0');
            const res = await fetch(RPC_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                jsonrpc: '2.0',
                method: 'eth_call',
                params: [{ to: '0x3600000000000000000000000000000000000000', data: callData }, 'latest'],
                id: 1
              })
            });
            const data = await res.json();
            if (data && data.result) {
              const rawVal = parseInt(data.result, 16);
              setWalletBalance((rawVal / 1000000).toFixed(2));
            }
          } catch (e) {
            console.error("Failed to fetch Circle wallet USDC balance:", e);
          }
        };

        fetchBalance();
        const interval = setInterval(fetchBalance, 15000);
        return () => clearInterval(interval);
      }, [circleUser]);

      // Sync active owner address inside header with connected Circle wallet
      useEffect(() => {
        if (circleUser && circleUser.walletAddress) {
          setAgentConfig(prev => ({
            ...prev,
            ownerAddress: circleUser.walletAddress
          }));
        }
      }, [circleUser]);

      // Helper: Chunked JSON-RPC Logs fetcher to bypass 10,000 block RPC limit
      const fetchLogsChunked = async (address, topics) => {
        try {
          const blockRes = await fetch(RPC_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ jsonrpc: '2.0', method: 'eth_blockNumber', params: [], id: 1 })
          });
          const blockData = await blockRes.json();
          if (!blockData || !blockData.result) return [];
          const latestBlock = parseInt(blockData.result, 16);

          const CHUNK_SIZE = 9999;
          const allLogs = [];
          const reqs = [];

          let startBlock = latestBlock - 100000;
          if (startBlock < 0) startBlock = 0;

          for (let from = startBlock; from <= latestBlock; from += CHUNK_SIZE + 1) {
            let to = from + CHUNK_SIZE;
            if (to > latestBlock) to = latestBlock;
            reqs.push({ fromHex: '0x' + from.toString(16), toHex: '0x' + to.toString(16) });
          }

          const results = await Promise.all(reqs.map(req => 
            fetch(RPC_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                jsonrpc: '2.0',
                method: 'eth_getLogs',
                params: [{ address, topics, fromBlock: req.fromHex, toBlock: req.toHex }],
                id: 1
              })
            }).then(r => r.json()).catch(err => {
              console.error("fetchLogs chunk failed:", err);
              return { result: [] };
            })
          ));
          
          for (const data of results) {
            if (data && data.result && Array.isArray(data.result)) {
              allLogs.push(...data.result);
            }
          }
          return allLogs;
        } catch (e) {
          console.error("fetchLogsChunked failed:", e);
          return [];
        }
      };

      // Load agent configs
      const loadAgentConfig = async () => {
        try {
          const res = await fetch(`${API_URL}/agent`);
          if (res.ok) {
            const data = await res.json();
            setAgentConfig(prev => ({
              agentId: data.agentId || '...',
              ownerAddress: circleUser ? circleUser.walletAddress : (data.ownerAddress || '...'),
              validatorAddress: data.validatorAddress || '...'
            }));
          }
        } catch (e) {
          console.warn("Express API /agent unreachable. Running in offline fallback mode:", e);
        }
      };

      // Load all subscriptions
      const loadSubscriptions = async () => {
        try {
          const res = await fetch(`${API_URL}/subscriptions`);
          if (res.ok) {
            const list = await res.json();
            if (Array.isArray(list)) {
              const formatted = list.map(sub => ({
                ...sub,
                amount: sub.amount ? String(sub.amount) : '0', 
                renewalDate: new Date(sub.renewalDate)
              }));
              setSubscriptions(formatted);
            }
          }
        } catch (e) {
          console.error("Failed to load subscriptions from backend:", e);
        }
      };

      // On-Chain historical logs query
      const loadBlockchainLogs = async () => {
        try {
          const TOPIC_JOB_CREATED = '0xb0f0239bfdd96453e24733e18bfc24b70d8fadf123dd977473518dd577ee79b9';
          const TOPIC_JOB_COMPLETED = '0x869e2577b006bf47ee981cf6fec2e25583548081c14b98deab587f77b5068038';
          const TOPIC_FEEDBACK_GIVEN = '0x6a4a61743519c9d648a14e6493f47dbe3ff1aa29e7785c96c8326a205e58febc';

          let dbJobs = { activeJobs: [] };
          try {
            const jobsRes = await fetch(`${API_URL}/jobs`);
            if (jobsRes.ok) {
              dbJobs = await jobsRes.json();
            }
          } catch (e) {
            console.warn("Failed to fetch jobs from local database:", e);
          }

          const createdLogs = await fetchLogsChunked(AGENTIC_COMMERCE_ADDRESS, [TOPIC_JOB_CREATED]);
          const completedLogs = await fetchLogsChunked(AGENTIC_COMMERCE_ADDRESS, [TOPIC_JOB_COMPLETED]);
          
          const parsedJobs = createdLogs.map(log => {
            const jobIdHex = log.topics[1];
            const jobId = parseInt(jobIdHex, 16);
            
            const matchingDbJob = dbJobs && dbJobs.activeJobs ? dbJobs.activeJobs.find(dj => dj.jobId === jobId.toString()) : null;
            let serviceName = '-';
            if (matchingDbJob && matchingDbJob.meta && matchingDbJob.meta.description) {
              const desc = matchingDbJob.meta.description;
              if (desc.startsWith('Cancel subscription: ')) {
                serviceName = desc.replace('Cancel subscription: ', '');
              } else if (desc.startsWith('Cancel: ')) {
                serviceName = desc.replace('Cancel: ', '');
              } else {
                serviceName = desc;
              }
            }
            
            const completedLog = completedLogs.find(cl => parseInt(cl.topics[1], 16) === jobId);
            let status = 'Active / Pending';
            let reason = '-';
            if (completedLog) {
              status = 'Completed';
              
              const rawReason = completedLog.data.toLowerCase();
              if (
                rawReason.includes('d8bf7293833406352eec85307307ebdbf48a434a87204e7a67d1750cf11a2145') || 
                rawReason === '' || 
                rawReason.includes('0000000000000000000000000000000000000000') ||
                rawReason === '0x'
              ) {
                reason = 'Cancellation Verified';
              } else {
                reason = rawReason.length > 10 ? rawReason.substring(0, 10) + '...' : rawReason;
              }
            }

            return {
              jobId,
              serviceName,
              txHash: log.transactionHash,
              status,
              reason
            };
          }).reverse();
          
          setJobs(parsedJobs);

          // Fetch Reputation score
          const numericAgentId = parseInt(agentConfig.agentId);
          if (isNaN(numericAgentId)) {
            setReputation({ score: 0, tag: 'Agent ID invalid' });
            return;
          }
          const agentIdHex = '0x' + numericAgentId.toString(16).padStart(64, '0');
          const feedbackLogs = await fetchLogsChunked(REPUTATION_REGISTRY_ADDRESS, [TOPIC_FEEDBACK_GIVEN, agentIdHex]);
          
          if (feedbackLogs.length > 0) {
            const latest = feedbackLogs[feedbackLogs.length - 1];
            const resData = latest.data.substring(2);
            const score = parseInt(resData.substring(64, 128), 16);
            
            const tagOffsetBytes = parseInt(resData.substring(384, 448), 16);
            const tagOffset = tagOffsetBytes * 2;
            const tagLenBytes = parseInt(resData.substring(tagOffset, tagOffset + 64), 16);
            const tagHex = resData.substring(tagOffset + 64, tagOffset + 64 + tagLenBytes * 2);
            
            let tag = '';
            for (let i = 0; i < tagHex.length; i += 2) {
              const code = parseInt(tagHex.substring(i, i + 2), 16);
              if (code > 31 && code < 127) tag += String.fromCharCode(code);
            }
            
            setReputation({ score, tag: tag.trim() });
          } else {
            setReputation({ score: 0, tag: 'No feedback yet' });
          }
        } catch (e) {
          console.error("Error fetching on-chain logs:", e);
        }
      };

      const refreshAll = async () => {
        await loadSubscriptions();
        await loadBlockchainLogs();
      };

      useEffect(() => {
        const init = async () => {
          await loadAgentConfig();
        };
        init();
      }, []);

      useEffect(() => {
        refreshAll();
        const interval = setInterval(refreshAll, 30000);
        return () => clearInterval(interval);
      }, [agentConfig]);

      // Form triggers
      const registerSubscription = async (e) => {
        e.preventDefault();
        if (!newSub.name || !newSub.cost || !newSub.renewalDate) {
          showNotification('Please fill in all subscription fields', 'error');
          return;
        }

        try {
          const res = await fetch(`${API_URL}/subscriptions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newSub)
          });
          if (res.ok) {
            const data = await res.json();
            if (data.message) {
              showNotification(data.message);
            } else {
              showNotification(`Registered subscription for '${newSub.name}'!`);
            }
            setNewSub({ name: '', cost: '', renewalDate: '' });
            loadSubscriptions();
          } else {
            const data = await res.json();
            showNotification(data.error || 'Registration failed', 'error');
          }
        } catch (error) {
          showNotification('Cannot connect to Express backend API', 'error');
        }
      };

      const registerPresetService = async (service) => {
        const payload = {
          name: service.name,
          cost: service.cost.toString(),
          renewalDate: new Date(Date.now() + 5 * 24 * 60 * 60 * 1000).toISOString().substring(0, 10)
        };

        try {
          const res = await fetch(`${API_URL}/subscriptions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            const data = await res.json();
            if (data.message) {
              showNotification(data.message);
            } else {
              showNotification(`Added ${service.name} preset instantly!`);
            }
            loadSubscriptions();
          } else {
            const data = await res.json();
            showNotification(data.error || 'Preset failed', 'error');
          }
        } catch (error) {
          showNotification('API Offline', 'error');
        }
      };

      const startEditing = (sub) => {
        setEditingId(sub.id);
        setEditForm({
          name: sub.name,
          cost: (Number(sub.amount) / 1000000).toString(),
          renewalDate: sub.renewalDate.toISOString().substring(0, 10)
        });
      };

      const saveEdit = async (id, originalName) => {
        try {
          const res = await fetch(`${API_URL}/subscriptions/${originalName}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: editForm.name,
              cost: editForm.cost,
              renewalDate: editForm.renewalDate
            })
          });
          if (res.ok) {
            showNotification('Subscription updated successfully!');
            setEditingId(null);
            loadSubscriptions();
          } else {
            const data = await res.json();
            showNotification(data.error || 'Edit failed', 'error');
          }
        } catch (e) {
          showNotification('Failed to update subscription', 'error');
        }
      };

      const cancelSubTrigger = async (subName) => {
        setCancellingSubs(prev => ({ ...prev, [subName]: true }));
        try {
          showNotification(`Escrow cancel requested for '${subName}'. Sending to Arc Testnet...`);
          const res = await fetch(`${API_URL}/subscriptions/${subName}/cancel`, {
            method: 'POST'
          });
          if (res.ok) {
            showNotification(`ERC-8183 Job pipeline kicked off! Check 'On-Chain Job History' in a moment.`);
            loadSubscriptions();
            let attempts = 0;
            const logPoller = setInterval(() => {
              loadBlockchainLogs();
              attempts++;
              if (attempts > 5) clearInterval(logPoller);
            }, 4000);
          } else {
            const data = await res.json();
            showNotification(data.error || 'Cancellation request failed', 'error');
          }
        } catch (e) {
          showNotification('Failed to trigger cancellation job', 'error');
        } finally {
          setCancellingSubs(prev => ({ ...prev, [subName]: false }));
        }
      };

      const triggerRenewalCheck = async () => {
        setIsTriggeringCheck(true);
        showNotification('Running manual renewal check loop...');
        try {
          const res = await fetch(`${API_URL}/trigger`, { method: 'POST' });
          if (res.ok) {
            showNotification('Renewal check finished. Escrow pipeline will be run for urgent renewals.');
            refreshAll();
          } else {
            showNotification('Manual check failed', 'error');
          }
        } catch (e) {
          showNotification('API Offline', 'error');
        } finally {
          setIsTriggeringCheck(false);
        }
      };

      const saveAgentKeys = async (e) => {
        e.preventDefault();
        if (!ownerKeyInput || !validatorKeyInput) {
          showNotification('Please fill in both key fields', 'error');
          return;
        }
        setIsSavingKeys(true);
        try {
          const res = await fetch(`${API_URL}/setup-keys`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ownerKey: ownerKeyInput, validatorKey: validatorKeyInput })
          });
          if (res.ok) {
            const data = await res.json();
            showNotification('Keys successfully saved and activated!');
            setAgentConfig({
              agentId: data.agentId,
              ownerAddress: data.ownerAddress,
              validatorAddress: data.validatorAddress
            });
            setOwnerKeyInput('');
            setValidatorKeyInput('');
          } else {
            const data = await res.json();
            showNotification(data.error || 'Keys validation failed', 'error');
          }
        } catch (e) {
          showNotification('Failed to setup keys. Is the API server offline?', 'error');
        } finally {
          setIsSavingKeys(false);
        }
      };

      // ── Auth Helpers ─────────────────────────────────────────────────────

      const showStepError = (msg) => {
        setWizardError(msg);
        setIsWizardLoading(false);
        console.error('Auth error:', msg);
        const errDiv = document.getElementById('step-error');
        if (errDiv) {
          errDiv.textContent = '❌ ' + msg;
          errDiv.style.display = 'block';
        }
      };

      const completeSignIn = (walletAddress, email) => {
        sessionStorage.setItem('circle_wallet', walletAddress);
        sessionStorage.setItem('circle_email', email);
        const sessionUser = { email, walletAddress, userId: email };
        setCircleUser(sessionUser);
        sessionStorage.setItem('submanager_circle_user', JSON.stringify(sessionUser));
        setWizardWalletAddress(walletAddress);
        setWizardStep(3);
        setShowLoginModal(false);
        showNotification(`Welcome back! Signed in as ${email}`);
      };

      // Helper: finish the auth flow after wallet address is confirmed
      const completeAuth = (walletAddress) => {
        if (!walletAddress) {
          showStepError('Auth completed but no wallet address returned by Circle.');
          return;
        }
        setWizardWalletAddress(walletAddress);
        const sessionUser = { email: wizardEmail, walletAddress, userId: wizardEmail };
        setCircleUser(sessionUser);
        sessionStorage.setItem('submanager_circle_user', JSON.stringify(sessionUser));
        setWizardStep(3);
        setShowLoginModal(false);
      };

      // ── OTP Verification (server-side, no SDK iframe) ──────────────────────
      // Called when user clicks "Verify & Continue" in Step 2.
      // Sends the typed OTP to /auth/verify which calls Circle's token refresh
      // endpoint and returns a verified userToken + wallet address.
      const verifyOTP = async () => {
        const input = document.getElementById('otp-input');
        const otp = input ? input.value.trim() : '';
        if (!otp || otp.length < 4) {
          setWizardError('Please enter the verification code from your email.');
          return;
        }
        setIsWizardLoading(true);
        setWizardError(null);
        try {
          const verifyRes = await fetch(`${API_URL}/auth/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              otpToken:          currentUserToken,
              otp,
              deviceToken:       currentDeviceToken,
              deviceEncryptionKey: currentEncryptionKey
            })
          });
          const verifyData = await verifyRes.json();
          if (!verifyRes.ok) {
            setWizardError(verifyData.error || 'Invalid verification code. Please try again.');
            setIsWizardLoading(false);
            return;
          }

          const { userToken, encryptionKey, walletAddress } = verifyData;
          currentUserToken = userToken;
          currentEncryptionKey = encryptionKey || currentEncryptionKey;

          if (walletAddress) {
            // Wallet already exists — auth complete
            completeAuth(walletAddress);
          } else {
            // New user — initialize wallet on Arc Testnet
            const initRes = await fetch(`${API_URL}/auth/initialize`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ userToken })
            });
            const initJson = await initRes.json();
            console.log('Initialize response:', initJson);
            // challengeId may be null on email-auth-only plans — wallet auto-created
            // Fetch wallet regardless
            const wRes = await fetch(`${API_URL}/auth/wallets`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ userToken })
            });
            const wData = await wRes.json();
            if (wData.walletAddress) {
              completeAuth(wData.walletAddress);
            } else {
              setWizardError('Wallet not yet available. Please wait a moment and try again.');
              setIsWizardLoading(false);
            }
          }
        } catch (e) {
          setWizardError(e.message);
          setIsWizardLoading(false);
        }
      };
      // Expose for the inline button onclick
      window.__verifyOTP = verifyOTP;


      const executeCircleInit = async (email) => {
        setIsWizardLoading(true);
        setWizardError(null);

        try {
          if (email.length > 50) throw new Error('Email must be under 50 characters');

          const isSignIn = wizardMode === 'signin';
          const endpoint = isSignIn ? '/auth/signin' : '/auth/init';
          const res = await fetch(`${API_URL}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: email, deviceId: getDeviceId() })
          });

          const data = await res.json();
          if (!res.ok) {
            showStepError(data.error || 'Auth failed');
            return;
          }

          const { otpToken, deviceToken, deviceEncryptionKey } = data;
          setWizardEmail(email);
          setWizardUserToken(otpToken || '');
          setWizardEncryptionKey(deviceEncryptionKey || '');

          // Store in module-level vars so verifyOTP / SDK callbacks can read them
          currentUserToken = otpToken || '';
          currentEncryptionKey = deviceEncryptionKey || '';
          currentDeviceToken = deviceToken || '';

          // Move to Step 2 so the SDK iframe container is rendered
          setWizardStep(2);
          setIsWizardLoading(true);

          setTimeout(async () => {
            try {
              // Fetch appId from server
              const appIdRes = await fetch(`${API_URL}/auth/appid`);
              const { appId } = await appIdRes.json();
              console.log('AppId from server:', appId, 'length:', appId?.length);
              if (!appId || appId.length < 10) {
                showStepError('CIRCLE_APP_ID missing on server — check Vercel env vars');
                return;
              }

              if (typeof window.W3SSdk === 'undefined') {
                showStepError('Circle Web SDK failed to load. Please refresh the page and try again.');
                return;
              }

              // Real Circle SDK uses W3SSdk class
              const sdk = new window.W3SSdk();
              await sdk.setAppSettings({ appId });
              sdk.setAuthentication({
                userToken: otpToken,
                encryptionKey: deviceEncryptionKey
              });

              setIsWizardLoading(false);

              // This triggers OTP input inside SDK iframe
              sdk.execute(deviceToken, async (err, result) => {
                if (err) { showStepError(err.message); return; }
                const verifiedUserToken = result?.data?.userToken || otpToken;
                const verifiedEncryptionKey = result?.data?.encryptionKey || deviceEncryptionKey;

                setIsWizardLoading(true);

                // Now initialize wallet
                const initRes = await fetch(`${API_URL}/auth/initialize`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ userToken: verifiedUserToken })
                });
                const { challengeId } = await initRes.json();

                if (challengeId) {
                  sdk.setAuthentication({ userToken: verifiedUserToken, encryptionKey: verifiedEncryptionKey });
                  sdk.execute(challengeId, async (err2, result2) => {
                    if (err2) { showStepError(err2.message); return; }
                    const walletsRes = await fetch(`${API_URL}/auth/wallets`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ userToken: verifiedUserToken })
                    });
                    const { walletAddress } = await walletsRes.json();
                    completeAuth(walletAddress);
                  });
                } else {
                  // No challenge needed (wallet already initialized or email-only flow)
                  const walletsRes = await fetch(`${API_URL}/auth/wallets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userToken: verifiedUserToken })
                  });
                  const { walletAddress } = await walletsRes.json();
                  completeAuth(walletAddress);
                }
              });
            } catch (sdkError) {
              showStepError(sdkError.message);
            }
          }, 200);

        } catch (e) {
          showStepError(e.message);
        }
      };

      // State A - Sign Out (clears sessionStorage)
      const handleSignOut = () => {
        setCircleUser(null);
        sessionStorage.removeItem('submanager_circle_user');
        loadAgentConfig();
        showNotification('Circle session signed out successfully.');

        <div className="space-y-8 pb-12 animate-fade-in w-full">
          


          {/* Notification Toast */}
          {notif && (

              notif.type === 'error' ? 'border-l-red-500 text-red-200' : 'border-l-arc text-slate-200'

              {notif.linkUrl && (
                <a href={notif.linkUrl} target="_blank" className="text-xs text-arc hover:underline font-bold self-start mt-1 flex items-center gap-1">

          {/* Top Bar with Three States (Signed Out, Connected, First-Time User) */}

              <span className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                🤖 SubManager
              </span>
              <span className="text-[10px] uppercase font-mono tracking-widest text-arc border border-arc/20 px-2 py-0.5 rounded-full bg-arc/5 font-semibold">Web3 Controller</span>
            </div>

            <div className="flex items-center gap-4">
              {!circleUser ? (
                // State A - Signed Out
                <button

                    setShowLoginModal(true);

                >
                  <span className="text-arc text-base font-bold">◑</span> Sign in with Circle
                </button>
              ) : (
                // State B - Wallet Connected
                <div className="flex items-center gap-3 flex-wrap">
                  <div className="flex items-center gap-2 bg-gray-900/60 border border-gray-800 rounded-lg px-3 py-1.5 text-xs">
                    <span className="w-2 h-2 bg-green-500 rounded-full pulse-dot"></span>
                    <span className="font-mono text-gray-300 font-medium">
                      {circleUser.email}: <span className="text-white font-bold">{truncateAddress(circleUser.walletAddress)}</span>
                    </span>
                    <span className="text-[10px] bg-arc/10 text-arc border border-arc/20 px-2 py-0.5 rounded font-mono font-bold">

                  </div>
                  <button

                    Sign Out
                  </button>
                </div>

          {/* Header */}

              <button

                {isKeysExpanded && (

                        <span className="text-[10px] bg-arc/20 text-arc px-2.5 py-0.5 rounded-full uppercase tracking-wider font-bold font-mono inline-block">

                    <div className="space-y-3">

              {/* Custom register form */}

            </div>

            {/* Dashboard Subscriptions cards grid */}
            <div className="lg:col-span-2 space-y-6">
              <section>
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-lg font-bold uppercase tracking-wider text-gray-300 flex items-center gap-2">
                    <span className="inline-block w-2.5 h-2.5 rounded-full bg-arc"></span>
                    Monitored Services ({subscriptions.length})
                  </h2>
                  <button onClick={loadSubscriptions} className="text-xs text-arc hover:underline">🔄 Reload</button>
                </div>
                {subscriptions.length === 0 ? (
                  <div className="glass-card rounded-2xl p-10 text-center text-gray-400 border-dashed border-2 border-white/10">
                    No subscriptions registered. Add a preset or register a custom service above!
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                </div>
                <div className="glass-card rounded-2xl overflow-hidden shadow-2xl">
                  <div className="max-h-[300px] overflow-y-auto scrollbar-thin">
                    <table className="w-full text-left text-sm text-gray-400">
                      <thead className="text-xs uppercase bg-gray-900/80 text-gray-400 border-b border-gray-800 sticky top-0 z-10">
                        <tr>
                          <th className="px-6 py-3.5 font-bold">Job ID</th>
                          <th className="px-6 py-3.5 font-bold">Service</th>
                          <th className="px-6 py-3.5 font-bold">Tx Hash</th>
                          <th className="px-6 py-3.5 font-bold">Status</th>
                          <th className="px-6 py-3.5 font-bold">Reason</th>
                        </tr>
                      </thead>
                      <tbody>
                        {jobs.length === 0 ? (
                          <tr><td colSpan="5" className="px-6 py-10 text-center text-gray-500">No on-chain cancellations captured in scanned block ranges.</td></tr>
                        ) : (
                          jobs.map((job, idx) => (
                            <tr key={idx} className="border-b border-gray-900 hover:bg-gray-900/30 transition-colors">
                              <td className="px-6 py-4 font-mono font-medium text-white">#{job.jobId}</td>
                              <td className="px-6 py-4 font-bold text-white uppercase tracking-wide">{job.serviceName}</td>
                              <td className="px-6 py-4 font-mono text-xs">
                                <a href={`https://testnet.arcscan.app/tx/${job.txHash}`} target="_blank" className="text-arc hover:underline">{truncateAddress(job.txHash)}</a>
                              </td>
                              <td className="px-6 py-4">
                                <span className={`px-2 py-1 rounded text-[10px] font-bold tracking-wider uppercase ${job.status === 'Completed' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'}`}>
                                  {job.status}
                                </span>
                              </td>
                              <td className="px-6 py-4">
                                <span className={`text-xs ${job.reason === 'Cancellation Verified' ? 'text-arc font-semibold' : 'text-gray-500 font-mono'}`}>{job.reason}</span>
                              </td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </section>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div className="lg:col-span-3">
              <div className="glass-card rounded-2xl p-6 shadow-2xl flex flex-col md:flex-row items-center justify-between border-t-2 border-t-arc/40 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-64 h-64 bg-arc/5 rounded-full blur-3xl pointer-events-none"></div>
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 rounded-xl bg-arc/10 flex items-center justify-center border border-arc/20 shadow-[0_0_15px_rgba(0,209,255,0.1)]">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-7 w-7 text-arc" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>
                  </div>
                  <div>
                    <h3 className="text-lg font-bold text-white font-semibold">SubManager Agent Reputation</h3>
                    <p className="text-xs text-gray-400 font-mono mt-0.5">ERC-8004 Rating Registry Log</p>
                  </div>
                </div>
                <div className="mt-4 md:mt-0 flex items-center gap-6">
                  {!reputation ? (
                    <div className="animate-pulse flex items-center gap-3"><div className="h-10 bg-gray-800 rounded w-16"></div><div className="h-6 bg-gray-800 rounded w-28"></div></div>
                  ) : (
                    <div className="flex items-center gap-6">
                      <div className="text-right">
                        <span className="text-[10px] uppercase text-gray-500 font-bold block">Dynamic Rating Score</span>
                        <span className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-arc to-blue-400 drop-shadow-[0_0_10px_rgba(0,209,255,0.3)]">{reputation.score}/100</span>
                      </div>
                      <div className="bg-gray-900/60 rounded-lg py-2 px-4 border border-gray-800">
                        <span className="text-[9px] uppercase text-gray-500 font-bold block mb-0.5">Feedback Event Tag</span>
                        <span className="text-xs font-mono text-arc font-semibold">{reputation.tag}</span>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Circle 4-Step Auth Modal Wizard */}
          {showLoginModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4 animate-fade-in">
              <div className="glass-card rounded-2xl p-6 max-w-lg w-full space-y-6">
                <div id="step-error" style={{color:'#f87171',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:'0.5rem',padding:'0.6rem 0.9rem',display:'none',fontSize:'0.75rem',fontFamily:'monospace'}}></div>
                
                {/* Modal Title & Close Button */}
                <div className="flex justify-between items-center border-b border-white/10 pb-3">
                  <h3 className="text-lg font-bold text-white flex items-center gap-2">
                    <span className="text-arc text-base font-bold">◑</span> SubManager Web3 Wallet Setup
                  </h3>
                  <button onClick={() => {
                    setShowLoginModal(false);
                    setWizardStep(1);
                    setWizardError(null);
                    setWizardEmail('');
                    setWizardUserToken('');
                    setWizardEncryptionKey('');
                    setWizardChallengeId('');
                    setIsWizardLoading(false);
                  }} className="text-gray-400 hover:text-white font-bold text-xl font-mono">×</button>
                </div>

                {/* Create Account / Sign In tabs (Only in Step 1) */}
                {wizardStep === 1 && (
                  <div className="flex bg-gray-950/50 p-1 rounded-lg border border-white/5">
                    <button
                      onClick={() => {
                        setWizardMode('create');
                        setWizardError(null);
                      }}
                      className={`flex-1 text-center py-1.5 text-xs font-bold rounded-md transition-all ${
                        wizardMode === 'create' ? 'bg-arc text-slate-950' : 'text-gray-400 hover:text-white'
                      }`}
                    >
                      Create Account
                    </button>
                    <button
                      onClick={() => {
                        setWizardMode('signin');
                        setWizardError(null);
                      }}
                      className={`flex-1 text-center py-1.5 text-xs font-bold rounded-md transition-all ${
                        wizardMode === 'signin' ? 'bg-arc text-slate-950' : 'text-gray-400 hover:text-white'
                      }`}
                    >
                      Sign In
                    </button>
                  </div>
                )}

                {/* Step Progress Bar — 2 steps for Sign In, 4 steps for Sign Up */}
                {wizardMode === 'signin' ? (
                  <div className="flex justify-between items-center text-xs font-mono border-b border-white/5 pb-4">
                    <div className="flex items-center gap-1.5">
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center font-bold ${
                        wizardStep === 1 ? 'bg-arc text-slate-950' : 'bg-green-500 text-slate-950'
                      }`}>{wizardStep > 1 ? '✓' : '1'}</span>
                      <span className={wizardStep === 1 ? 'text-arc font-bold' : 'text-green-400 font-bold'}>Email</span>
                    </div>
                    <span className="text-gray-600">→</span>
                    <div className="flex items-center gap-1.5">
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center font-bold ${
                        wizardStep === 2 ? 'bg-arc text-slate-950' : 'bg-gray-800 text-gray-400'
                      }`}>2</span>
                      <span className={wizardStep === 2 ? 'text-arc font-bold' : 'text-gray-500'}>Verify</span>
                    </div>
                    <span className="text-gray-600">→</span>
                    <div className="flex items-center gap-1.5">
                      <span className="w-5 h-5 rounded-full flex items-center justify-center font-bold bg-gray-800 text-gray-400">✓</span>
                      <span className="text-gray-500">Done</span>
                    </div>
                  </div>
                ) : (
                  <div className="flex justify-between items-center text-xs font-mono border-b border-white/5 pb-4">
                    <div className="flex items-center gap-1.5">
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center font-bold ${
                        wizardStep === 1 ? 'bg-arc text-slate-950' : wizardStep > 1 ? 'bg-green-500 text-slate-950' : 'bg-gray-800 text-gray-400'
                      }`}>{wizardStep > 1 ? '✓' : '1'}</span>
                      <span className={wizardStep === 1 ? 'text-arc font-bold' : wizardStep > 1 ? 'text-green-400 font-bold' : 'text-gray-500'}>Email</span>
                    </div>
                    <span className="text-gray-600">→</span>
                    <div className="flex items-center gap-1.5">
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center font-bold ${
                        wizardStep === 2 ? 'bg-arc text-slate-950' : wizardStep > 2 ? 'bg-green-500 text-slate-950' : 'bg-gray-800 text-gray-400'
                      }`}>{wizardStep > 2 ? '✓' : '2'}</span>
                      <span className={wizardStep === 2 ? 'text-arc font-bold' : wizardStep > 2 ? 'text-green-400 font-bold' : 'text-gray-500'}>Setup</span>
                    </div>
                    <span className="text-gray-600">→</span>
                    <div className="flex items-center gap-1.5">
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center font-bold ${
                        wizardStep === 3 ? 'bg-arc text-slate-950' : wizardStep > 3 ? 'bg-green-500 text-slate-950' : 'bg-gray-800 text-gray-400'
                      }`}>{wizardStep > 3 ? '✓' : '3'}</span>
                      <span className={wizardStep === 3 ? 'text-arc font-bold' : wizardStep > 3 ? 'text-green-400 font-bold' : 'text-gray-500'}>Wallet</span>
                    </div>
                    <span className="text-gray-600">→</span>
                    <div className="flex items-center gap-1.5">
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center font-bold ${
                        wizardStep === 4 ? 'bg-arc text-slate-950' : 'bg-gray-800 text-gray-400'
                      }`}>4</span>
                      <span className={wizardStep === 4 ? 'text-arc font-bold' : 'text-gray-500'}>Fund</span>
                    </div>
                  </div>
                )}

                {/* Wizard Steps Content */}
                <div className="space-y-4">
                  {/* Step 1 — Email Entry */}
                  {wizardStep === 1 && (
                    <form onSubmit={(e) => {
                      e.preventDefault();
                      const email = e.target.email.value;
                      if (!email || !email.includes('@')) {
                        setWizardError('Please enter a valid email address');
                        return;
                      }
                      executeCircleInit(email);
                    }} className="space-y-4">
                      <div className="space-y-2">
                        <label className="text-[11px] uppercase text-gray-400 font-bold tracking-wider">Email Address</label>
                        <input
                          type="email"
                          name="email"
                          defaultValue={wizardEmail}
                          placeholder="you@example.com"
                          required
                          disabled={isWizardLoading}
                          className={`w-full glass-input rounded-lg px-3 py-2.5 text-sm font-medium ${wizardError ? 'border-red-500' : ''}`}
                        />
                      </div>
                      
                      {wizardError && (
                        <p className="text-xs text-red-400 border border-red-500/20 bg-red-500/5 rounded-lg p-2.5 font-mono">{wizardError}</p>
                      )}

                      <button type="submit" disabled={isWizardLoading} className="w-full text-sm bg-arc hover:bg-arcDark disabled:opacity-50 text-slate-950 py-2.5 rounded-lg font-extrabold flex justify-center items-center gap-2 transition-all shadow-[0_0_15px_rgba(0,209,255,0.25)]">
                        {isWizardLoading ? (
                          <><span className="animate-spin inline-block w-4 h-4 border-2 border-slate-950 border-t-transparent rounded-full"></span> Processing...</>
                        ) : wizardMode === 'signin' ? 'Sign In' : 'Send Verification Code'}
                      </button>
                    </form>
                  )}

                  {/* Step 2 — OTP Verification via Circle SDK iframe */}
                  {wizardStep === 2 && (
                    <div className="space-y-4">
                      <div className="bg-arc/5 border border-arc/20 rounded-xl p-4 space-y-2">
                        <h4 className="text-sm font-bold text-arc flex items-center gap-2">
                          <span>📧</span> Check your email!
                        </h4>
                        <p className="text-xs text-gray-300 leading-relaxed font-mono">
                          We sent a verification code to <strong className="text-white">{wizardEmail}</strong>.
                          Enter it in the secure Circle box below to continue.
                        </p>
                      </div>

                      {/* Circle SDK iframe container */}
                      <div
                        id="circle-sdk-iframe"
                        className="w-full bg-slate-900/50 border border-white/5 rounded-xl overflow-hidden flex flex-col items-center justify-center relative p-6"
                        style={{ minHeight: '380px' }}
                      >
                        {isWizardLoading && (
                          <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/70 backdrop-blur-xs space-y-4 z-10 p-6 text-center animate-fade-in">
                            <span className="animate-spin inline-block w-8 h-8 border-4 border-arc border-t-transparent rounded-full"></span>
                            <span className="text-xs font-mono text-gray-400">
                              Loading Secure Circle Iframe...
                            </span>
                          </div>
                        )}
                      </div>

                      {wizardError && (
                        <p className="text-xs text-red-400 border border-red-500/20 bg-red-500/5 rounded-lg p-2.5 font-mono whitespace-pre-wrap">{wizardError}</p>
                      )}

                      <div className="flex justify-between items-center pt-2">
                        <button
                          onClick={() => { setWizardStep(1); setWizardError(null); }}
                          className="text-xs text-gray-400 hover:text-white transition-colors flex items-center gap-1 font-semibold"
                        >
                          ← Back to Email
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Step 3 — Wallet Created */}
                  {wizardStep === 3 && (
                    <div className="space-y-5">
                      <div className="text-center py-4 space-y-2">
                        <div className="text-4xl">🎉</div>
                        <h4 className="text-lg font-bold text-green-400">Your Arc Testnet wallet is ready!</h4>
                        <p className="text-xs text-gray-400">A secure user-controlled smart wallet has been created for your email.</p>
                      </div>

                      <div className="space-y-2">
                        <label className="text-[10px] uppercase text-gray-400 font-bold tracking-wider font-mono">Your Wallet Address</label>
                        <div className="flex gap-2">
                          <input
                            type="text"
                            readOnly
                            value={wizardWalletAddress}
                            className="flex-1 glass-input rounded-lg px-3 py-2 text-xs font-mono text-center select-all"
                          />
                          <button onClick={() => {
                            navigator.clipboard.writeText(wizardWalletAddress);
                            showNotification('Wallet address copied to clipboard!');
                          }} className="bg-white/10 hover:bg-white/20 text-white font-mono text-xs px-3 py-2 rounded-lg font-bold transition-all">
                            Copy
                          </button>
                        </div>
                      </div>

                      {wizardError && (
                        <p className="text-xs text-red-400 border border-red-500/20 bg-red-500/5 rounded-lg p-2.5 font-mono">{wizardError}</p>
                      )}

                      <div className="flex gap-3">
                        <button onClick={() => {
                          setWizardStep(2);
                          setWizardError(null);
                        }} className="flex-1 border border-white/10 hover:bg-white/5 text-white font-bold py-2.5 rounded-lg text-sm transition-all">
                          ← Back
                        </button>
                        <button onClick={() => setWizardStep(4)} className="flex-[2] bg-arc hover:bg-arcDark text-slate-950 font-extrabold py-2.5 rounded-lg text-sm transition-all">
                          Continue to Funding →
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Step 4 — Fund Your Wallet */}
                  {wizardStep === 4 && (
                    <div className="space-y-5">
                      <div className="bg-arc/5 border border-arc/20 rounded-xl p-4 space-y-3 font-mono text-xs text-gray-300">
                        <p className="text-sm font-bold text-white mb-2">🎉 Setup complete! Here's your wallet address:</p>
                        <div className="bg-slate-950/60 p-2 rounded border border-white/5 text-center text-white select-all">{wizardWalletAddress}</div>
                        
                        <p className="mt-4 font-sans text-gray-400 font-semibold uppercase tracking-wider text-[10px]">To use SubManager you need testnet USDC:</p>
                        <ol className="list-decimal pl-4 space-y-2 text-xs">
                          <li>Click the button below to open Circle Faucet</li>
                          <li>Paste your wallet address</li>
                          <li>Select 'Arc Testnet' and request USDC</li>
                          <li>Come back here — you're ready to go!</li>
                        </ol>
                      </div>

                      {wizardError && (
                        <p className="text-xs text-red-400 border border-red-500/20 bg-red-500/5 rounded-lg p-2.5 font-mono">{wizardError}</p>
                      )}

                      <div className="space-y-3">
                        <a href="https://faucet.circle.com" target="_blank" className="w-full bg-gradient-to-r from-arc to-blue-500 hover:from-arcDark hover:to-blue-600 text-slate-950 font-extrabold py-3 rounded-lg text-sm transition-all flex justify-center items-center gap-2 shadow-[0_0_15px_rgba(0,209,255,0.3)]">
                          Get Free Testnet USDC →
                        </a>
                        
                        <div className="flex gap-3">
                          <button onClick={() => {
                            setWizardStep(3);
                            setWizardError(null);
                          }} className="flex-1 border border-white/10 hover:bg-white/5 text-white font-bold py-2.5 rounded-lg text-sm transition-all">
                            ← Back
                          </button>
                          <button onClick={() => {
                            setShowLoginModal(false);
                            setWizardStep(1);
                            setWizardEmail('');
                          }} className="flex-[2] bg-green-500 hover:bg-green-600 text-slate-950 font-extrabold py-2.5 rounded-lg text-sm transition-all shadow-[0_0_10px_rgba(34,197,94,0.3)]">
                            Start Using SubManager
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
