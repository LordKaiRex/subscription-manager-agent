<body class="antialiased min-h-screen flex flex-col items-center py-8 px-4">
  <div id="root" class="w-full max-w-5xl"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Static Addresses
    const AGENTIC_COMMERCE_ADDRESS = '0x0747EEf0706327138c69792bF28Cd525089e4583';
    const REPUTATION_REGISTRY_ADDRESS = '0x8004B663056A597Dffe9eCcC1965A193B7388713';
    const RPC_URL = 'https://rpc.testnet.arc.network';
    const API_URL = 'http://localhost:3001';

    // React Error Boundary to catch render failures
    class ErrorBoundary extends React.Component {
      state = { error: null };
      static getDerivedStateFromError(error) { 
        return { error: error.message || String(error) }; 
      }
      componentDidCatch(error, errorInfo) {
        console.error("ErrorBoundary caught an uncaught error:", error, errorInfo);
      }
      render() {
        if (this.state.error) {
          return React.createElement('div', 
            { style: { color: '#ff6b6b', padding: '2.5rem', background: '#111827', borderRadius: '1rem', border: '1px solid rgba(255, 107, 107, 0.2)', fontFamily: 'monospace', maxWidth: '600px', margin: '2rem auto' } },
            React.createElement('h2', { style: { marginTop: 0 } }, '❌ SubManager Dashboard Crash'),
            React.createElement('pre', { style: { whiteSpace: 'pre-wrap', background: 'rgba(0,0,0,0.2)', padding: '1rem', borderRadius: '0.5rem' } }, this.state.error),
            React.createElement('button', { 
              onClick: () => window.location.reload(),
              style: { background: '#00D1FF', color: '#000', border: 'none', padding: '0.5rem 1rem', borderRadius: '0.25rem', cursor: 'pointer', fontWeight: 'bold', marginTop: '1rem' }
            }, 'Reload Dashboard')
          );
        }
        return this.props.children;
      }
    }

    // Browser-safe fallback implementation of W3SSdk if CDN fails
    class CustomW3SSdkFallback {
      constructor(configs) {
        this.configs = configs;
        this.serviceUrl = 'https://pw-auth.circle.com';
        this.iframe = document.createElement('iframe');

        this.messageHandler = (event) => {
          if (event.origin !== this.serviceUrl) return;

          if (event.data?.onFrameReady) {
            this.iframe.contentWindow.postMessage({
              w3s: {
                appSettings: this.configs?.configs?.appSettings || { appId: '' },
                auth: this.auth || {},
                challenge: this.challenge || {},
                deviceInfo: { model: 'Web', version: '1.1.11' }
              }
            }, this.serviceUrl);
          } else if (event.data?.onComplete) {
            this.closeModal();
            this.unSubscribeMessage();
            if (this.onComplete) this.onComplete(undefined, event.data.result);
          } else if (event.data?.onError) {
            this.closeModal();
            this.unSubscribeMessage();
            if (this.onComplete) this.onComplete(event.data.error, undefined);
          } else if (event.data?.showUi) {
            this.iframe.width = '100%';
            this.iframe.height = '100%';
            this.iframe.style.zIndex = '2147483647';
            this.iframe.style.position = 'fixed';
            this.iframe.style.top = '50%';
            this.iframe.style.left = '50%';
            this.iframe.style.transform = 'translate(-50%, -50%)';
            this.iframe.style.display = 'block';
          } else if (event.data?.onClose) {
            this.closeModal();
            this.unSubscribeMessage();
          }
        };
      }

      setAuthentication(auth) {
        this.auth = auth;
      }

      execute(challengeId, onComplete) {
        this.challenge = { challengeId };
        this.onComplete = onComplete;

        if (challengeId.startsWith('mock')) {
          console.log("Simulating Circle Wallet PIN challenge setup...");
          setTimeout(() => {
            if (this.onComplete) this.onComplete(undefined, { success: true });
          }, 1500);
          return;
        }

        window.addEventListener('message', this.messageHandler, false);
        const protocol = window.location.protocol;
        const host = window.location.host;
        const origin = protocol.startsWith('http') ? `${protocol}//${host}` : 'http://localhost:3000';
        this.iframe.src = `${this.serviceUrl}?origin=${origin}`;
        this.iframe.style.display = 'none';
        document.body.appendChild(this.iframe);
      }

      closeModal() {
        if (this.iframe && this.iframe.parentNode) {
          this.iframe.parentNode.removeChild(this.iframe);
        }
      }

      unSubscribeMessage() {
        window.removeEventListener('message', this.messageHandler);
      }
    }

    const POPULAR_SERVICES = [
      { name: 'Netflix', cost: 15.99, color: 'hover:border-red-500/40 text-red-400 bg-red-500/5' },
      { name: 'Spotify', cost: 9.99, color: 'hover:border-green-500/40 text-green-400 bg-green-500/5' },
      { name: 'ChatGPT Plus', cost: 20.00, color: 'hover:border-emerald-500/40 text-emerald-400 bg-emerald-500/5' },
      { name: 'Amazon Prime', cost: 14.99, color: 'hover:border-amber-500/40 text-amber-400 bg-amber-500/5' },
      { name: 'YouTube Premium', cost: 13.99, color: 'hover:border-red-600/40 text-red-500 bg-red-600/5' },
      { name: 'Apple TV+', cost: 9.99, color: 'hover:border-slate-300/40 text-slate-300 bg-slate-300/5' },
      { name: 'Disney+', cost: 10.99, color: 'hover:border-blue-400/40 text-blue-400 bg-blue-400/5' },
      { name: 'Notion', cost: 16.00, color: 'hover:border-stone-400/40 text-stone-300 bg-stone-400/5' },
      { name: 'GitHub Pro', cost: 4.00, color: 'hover:border-purple-400/40 text-purple-400 bg-purple-400/5' },
      { name: 'Figma', cost: 15.00, color: 'hover:border-pink-500/40 text-pink-400 bg-pink-500/5' },
    ];

    const truncateAddress = (addr) => addr ? `${addr.substring(0, 6)}...${addr.substring(addr.length - 4)}` : '';

    function App() {
      // Configuration state resolved dynamically from API
      const [agentConfig, setAgentConfig] = useState({ 
        agentId: '...', 
        ownerAddress: '...',
        validatorAddress: '...'
      });

      // App Configs from backend auth/appid
      const [appConfig, setAppConfig] = useState({ appId: '', googleClientId: '' });

      // Circle Sign In States (State A / State B)
      const [circleUser, setCircleUser] = useState(() => {
        // Session Persistence using sessionStorage
        const stored = sessionStorage.getItem('submanager_circle_user');
        return stored ? JSON.parse(stored) : null; 
      });
      const [walletBalance, setWalletBalance] = useState('0.00');
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [activeTab, setActiveTab] = useState('email'); // 'email' | 'google' | 'new'
      const [loginEmailInput, setLoginEmailInput] = useState('');
      const [isLoggingIn, setIsLoggingIn] = useState(false);

      // Collapsible panel state
      const [isKeysExpanded, setIsKeysExpanded] = useState(true);
      const [ownerKeyInput, setOwnerKeyInput] = useState('');
      const [validatorKeyInput, setValidatorKeyInput] = useState('');
      const [isSavingKeys, setIsSavingKeys] = useState(false);

      const [subscriptions, setSubscriptions] = useState([]);
      const [jobs, setJobs] = useState([]);
      const [reputation, setReputation] = useState({ score: 0, tag: 'Loading...' });
      const [notif, setNotif] = useState(null);

      // Forms
      const [newSub, setNewSub] = useState({ name: '', cost: '', renewalDate: '' });
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({ name: '', cost: '', renewalDate: '' });
      
      // Loading indicators
      const [isTriggeringCheck, setIsTriggeringCheck] = useState(false);
      const [cancellingSubs, setCancellingSubs] = useState({});

      const showNotification = (message, type = 'success', linkText = '', linkUrl = '') => {
        setNotif({ message, type, linkText, linkUrl });
        setTimeout(() => setNotif(null), 10000);
      };

      // Fetch appIds on startup
      useEffect(() => {
        const fetchAppId = async () => {
          try {
            const res = await fetch(`${API_URL}/auth/appid`);
            if (res.ok) {
              const data = await res.json();
              setAppConfig(data);
            }
          } catch (e) {
            console.error("Failed to load appId configs:", e);
          }
        };
        fetchAppId();
      }, []);

      // Fetch Circle Wallet USDC Balance
      useEffect(() => {
        const fetchBalance = async () => {
          if (!circleUser || !circleUser.walletAddress) {
            setWalletBalance('0.00');
            return;
          }
          try {
            const clean = circleUser.walletAddress.toLowerCase().replace('0x', '');
            const callData = '0x70a08231' + clean.padStart(64, '0');
            const res = await fetch(RPC_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                jsonrpc: '2.0',
                method: 'eth_call',
                params: [{ to: '0x3600000000000000000000000000000000000000', data: callData }, 'latest'],
                id: 1
              })
            });
            const data = await res.json();
            if (data && data.result) {
              const rawVal = parseInt(data.result, 16);
              setWalletBalance((rawVal / 1000000).toFixed(2));
            }
          } catch (e) {
            console.error("Failed to fetch Circle wallet USDC balance:", e);
          }
        };

        fetchBalance();
        const interval = setInterval(fetchBalance, 15000);
        return () => clearInterval(interval);
      }, [circleUser]);

      // Sync active owner address inside header with connected Circle wallet
      useEffect(() => {
        if (circleUser && circleUser.walletAddress) {
          setAgentConfig(prev => ({
            ...prev,
            ownerAddress: circleUser.walletAddress
          }));
        }
      }, [circleUser]);

      // Helper: Chunked JSON-RPC Logs fetcher to bypass 10,000 block RPC limit
      const fetchLogsChunked = async (address, topics) => {
        try {
          const blockRes = await fetch(RPC_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ jsonrpc: '2.0', method: 'eth_blockNumber', params: [], id: 1 })
          });
          const blockData = await blockRes.json();
          if (!blockData || !blockData.result) return [];
          const latestBlock = parseInt(blockData.result, 16);

          const CHUNK_SIZE = 9999;
          const allLogs = [];
          const reqs = [];

          let startBlock = latestBlock - 100000;
          if (startBlock < 0) startBlock = 0;

          for (let from = startBlock; from <= latestBlock; from += CHUNK_SIZE + 1) {
            let to = from + CHUNK_SIZE;
            if (to > latestBlock) to = latestBlock;
            reqs.push({ fromHex: '0x' + from.toString(16), toHex: '0x' + to.toString(16) });
          }

          const results = await Promise.all(reqs.map(req => 
            fetch(RPC_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                jsonrpc: '2.0',
                method: 'eth_getLogs',
                params: [{ address, topics, fromBlock: req.fromHex, toBlock: req.toHex }],
                id: 1
              })
            }).then(r => r.json()).catch(err => {
              console.error("fetchLogs chunk failed:", err);
              return { result: [] };
            })
          ));
          
          for (const data of results) {
            if (data && data.result && Array.isArray(data.result)) {
              allLogs.push(...data.result);
            }
          }
          return allLogs;
        } catch (e) {
          console.error("fetchLogsChunked failed:", e);
          return [];
        }
      };

      // Load agent configs
      const loadAgentConfig = async () => {
        try {
          const res = await fetch(`${API_URL}/agent`);
          if (res.ok) {
            const data = await res.json();
            setAgentConfig(prev => ({
              agentId: data.agentId || '...',
              ownerAddress: circleUser ? circleUser.walletAddress : (data.ownerAddress || '...'),
              validatorAddress: data.validatorAddress || '...'
            }));
          }
        } catch (e) {
          console.warn("Express API /agent unreachable. Running in offline fallback mode:", e);
        }
      };

      // Load all subscriptions
      const loadSubscriptions = async () => {
        try {
          const res = await fetch(`${API_URL}/subscriptions`);
          if (res.ok) {
            const list = await res.json();
            if (Array.isArray(list)) {
              const formatted = list.map(sub => ({
                ...sub,
                amount: sub.amount ? String(sub.amount) : '0', 
                renewalDate: new Date(sub.renewalDate)
              }));
              setSubscriptions(formatted);
            }
          }
        } catch (e) {
          console.error("Failed to load subscriptions from backend:", e);
        }
      };

      // On-Chain historical logs query
      const loadBlockchainLogs = async () => {
        try {
          const TOPIC_JOB_CREATED = '0xb0f0239bfdd96453e24733e18bfc24b70d8fadf123dd977473518dd577ee79b9';
          const TOPIC_JOB_COMPLETED = '0x869e2577b006bf47ee981cf6fec2e25583548081c14b98deab587f77b5068038';
          const TOPIC_FEEDBACK_GIVEN = '0x6a4a61743519c9d648a14e6493f47dbe3ff1aa29e7785c96c8326a205e58febc';

          let dbJobs = { activeJobs: [] };
          try {
            const jobsRes = await fetch(`${API_URL}/jobs`);
            if (jobsRes.ok) {
              dbJobs = await jobsRes.json();
            }
          } catch (e) {
            console.warn("Failed to fetch jobs from local database:", e);
          }

          const createdLogs = await fetchLogsChunked(AGENTIC_COMMERCE_ADDRESS, [TOPIC_JOB_CREATED]);
          const completedLogs = await fetchLogsChunked(AGENTIC_COMMERCE_ADDRESS, [TOPIC_JOB_COMPLETED]);
          
          const parsedJobs = createdLogs.map(log => {
            const jobIdHex = log.topics[1];
            const jobId = parseInt(jobIdHex, 16);
            
            const matchingDbJob = dbJobs && dbJobs.activeJobs ? dbJobs.activeJobs.find(dj => dj.jobId === jobId.toString()) : null;
            let serviceName = '-';
            if (matchingDbJob && matchingDbJob.meta && matchingDbJob.meta.description) {
              const desc = matchingDbJob.meta.description;
              if (desc.startsWith('Cancel subscription: ')) {
                serviceName = desc.replace('Cancel subscription: ', '');
              } else if (desc.startsWith('Cancel: ')) {
                serviceName = desc.replace('Cancel: ', '');
              } else {
                serviceName = desc;
              }
            }
            
            const completedLog = completedLogs.find(cl => parseInt(cl.topics[1], 16) === jobId);
            let status = 'Active / Pending';
            let reason = '-';
            if (completedLog) {
              status = 'Completed';
              
              const rawReason = completedLog.data.toLowerCase();
              if (
                rawReason.includes('d8bf7293833406352eec85307307ebdbf48a434a87204e7a67d1750cf11a2145') || 
                rawReason === '' || 
                rawReason.includes('0000000000000000000000000000000000000000') ||
                rawReason === '0x'
              ) {
                reason = 'Cancellation Verified';
              } else {
                reason = rawReason.length > 10 ? rawReason.substring(0, 10) + '...' : rawReason;
              }
            }

            return {
              jobId,
              serviceName,
              txHash: log.transactionHash,
              status,
              reason
            };
          }).reverse();
          
          setJobs(parsedJobs);

          // Fetch Reputation score
          const numericAgentId = parseInt(agentConfig.agentId);
          if (isNaN(numericAgentId)) {
            setReputation({ score: 0, tag: 'Agent ID invalid' });
            return;
          }
          const agentIdHex = '0x' + numericAgentId.toString(16).padStart(64, '0');
          const feedbackLogs = await fetchLogsChunked(REPUTATION_REGISTRY_ADDRESS, [TOPIC_FEEDBACK_GIVEN, agentIdHex]);
          
          if (feedbackLogs.length > 0) {
            const latest = feedbackLogs[feedbackLogs.length - 1];
            const resData = latest.data.substring(2);
            const score = parseInt(resData.substring(64, 128), 16);
            
            const tagOffsetBytes = parseInt(resData.substring(384, 448), 16);
            const tagOffset = tagOffsetBytes * 2;
            const tagLenBytes = parseInt(resData.substring(tagOffset, tagOffset + 64), 16);
            const tagHex = resData.substring(tagOffset + 64, tagOffset + 64 + tagLenBytes * 2);
            
            let tag = '';
            for (let i = 0; i < tagHex.length; i += 2) {
              const code = parseInt(tagHex.substring(i, i + 2), 16);
              if (code > 31 && code < 127) tag += String.fromCharCode(code);
            }
            
            setReputation({ score, tag: tag.trim() });
          } else {
            setReputation({ score: 0, tag: 'No feedback yet' });
          }
        } catch (e) {
          console.error("Error fetching on-chain logs:", e);
        }
      };

      const refreshAll = async () => {
        await loadSubscriptions();
        await loadBlockchainLogs();
      };

      useEffect(() => {
        const init = async () => {
          await loadAgentConfig();
        };
        init();
      }, []);

      useEffect(() => {
        refreshAll();
        const interval = setInterval(refreshAll, 30000);
        return () => clearInterval(interval);
      }, [agentConfig]);

      // Form triggers
      const registerSubscription = async (e) => {
        e.preventDefault();
        if (!newSub.name || !newSub.cost || !newSub.renewalDate) {
          showNotification('Please fill in all subscription fields', 'error');
          return;
        }

        try {
          const res = await fetch(`${API_URL}/subscriptions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newSub)
          });
          if (res.ok) {
            const data = await res.json();
            if (data.message) {
              showNotification(data.message);
            } else {
              showNotification(`Registered subscription for '${newSub.name}'!`);
            }
            setNewSub({ name: '', cost: '', renewalDate: '' });
            loadSubscriptions();
          } else {
            const data = await res.json();
            showNotification(data.error || 'Registration failed', 'error');
          }
        } catch (error) {
          showNotification('Cannot connect to Express backend API', 'error');
        }
      };

      const registerPresetService = async (service) => {
        const payload = {
          name: service.name,
          cost: service.cost.toString(),
          renewalDate: new Date(Date.now() + 5 * 24 * 60 * 60 * 1000).toISOString().substring(0, 10)
        };

        try {
          const res = await fetch(`${API_URL}/subscriptions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            const data = await res.json();
            if (data.message) {
              showNotification(data.message);
            } else {
              showNotification(`Added ${service.name} preset instantly!`);
            }
            loadSubscriptions();
          } else {
            const data = await res.json();
            showNotification(data.error || 'Preset failed', 'error');
          }
        } catch (error) {
          showNotification('API Offline', 'error');
        }
      };

      const startEditing = (sub) => {
        setEditingId(sub.id);
        setEditForm({
          name: sub.name,
          cost: (Number(sub.amount) / 1000000).toString(),
          renewalDate: sub.renewalDate.toISOString().substring(0, 10)
        });
      };

      const saveEdit = async (id, originalName) => {
        try {
          const res = await fetch(`${API_URL}/subscriptions/${originalName}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: editForm.name,
              cost: editForm.cost,
              renewalDate: editForm.renewalDate
            })
          });
          if (res.ok) {
            showNotification('Subscription updated successfully!');
            setEditingId(null);
            loadSubscriptions();
          } else {
            const data = await res.json();
            showNotification(data.error || 'Edit failed', 'error');
          }
        } catch (e) {
          showNotification('Failed to update subscription', 'error');
        }
      };

      const cancelSubTrigger = async (subName) => {
        setCancellingSubs(prev => ({ ...prev, [subName]: true }));
        try {
          showNotification(`Escrow cancel requested for '${subName}'. Sending to Arc Testnet...`);
          const res = await fetch(`${API_URL}/subscriptions/${subName}/cancel`, {
            method: 'POST'
          });
          if (res.ok) {
            showNotification(`ERC-8183 Job pipeline kicked off! Check 'On-Chain Job History' in a moment.`);
            loadSubscriptions();
            let attempts = 0;
            const logPoller = setInterval(() => {
              loadBlockchainLogs();
              attempts++;
              if (attempts > 5) clearInterval(logPoller);
            }, 4000);
          } else {
            const data = await res.json();
            showNotification(data.error || 'Cancellation request failed', 'error');
          }
        } catch (e) {
          showNotification('Failed to trigger cancellation job', 'error');
        } finally {
          setCancellingSubs(prev => ({ ...prev, [subName]: false }));
        }
      };

      const triggerRenewalCheck = async () => {
        setIsTriggeringCheck(true);
        showNotification('Running manual renewal check loop...');
        try {
          const res = await fetch(`${API_URL}/trigger`, { method: 'POST' });
          if (res.ok) {
            showNotification('Renewal check finished. Escrow pipeline will be run for urgent renewals.');
            refreshAll();
          } else {
            showNotification('Manual check failed', 'error');
          }
        } catch (e) {
          showNotification('API Offline', 'error');
        } finally {
          setIsTriggeringCheck(false);
        }
      };

      // save manual keys logic
      const saveAgentKeys = async (e) => {
        e.preventDefault();
        if (!ownerKeyInput || !validatorKeyInput) {
          showNotification('Please fill in both key fields', 'error');
          return;
        }
        setIsSavingKeys(true);
        try {
          const res = await fetch(`${API_URL}/setup-keys`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ownerKey: ownerKeyInput, validatorKey: validatorKeyInput })
          });
          if (res.ok) {
            const data = await res.json();
            showNotification('Keys successfully saved and activated!');
            setAgentConfig({
              agentId: data.agentId,
              ownerAddress: data.ownerAddress,
              validatorAddress: data.validatorAddress
            });
            setOwnerKeyInput('');
            setValidatorKeyInput('');
          } else {
            const data = await res.json();
            showNotification(data.error || 'Keys validation failed', 'error');
          }
        } catch (e) {
          showNotification('Failed to setup keys. Is the API server offline?', 'error');
        } finally {
          setIsSavingKeys(false);
        }
      };

      // Handle Email Login challenge
      const handleCircleEmailLogin = async (e) => {
        e.preventDefault();
        if (!loginEmailInput || !loginEmailInput.includes('@')) {
          showNotification('Please enter a valid email address', 'error');
          return;
        }

        setIsLoggingIn(true);
        try {
          const res = await fetch(`${API_URL}/auth/init`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: loginEmailInput })
          });

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || 'Failed to initialize session');
          }

          const data = await res.json();

          if (data.challengeId) {
            // Execute secure PIN setup challenge using Web SDK
            const W3SSdkRunner = window.W3SSdk || CustomW3SSdkFallback;
            const sdk = new W3SSdkRunner({ configs: { appSettings: { appId: data.appId } } });
            sdk.setAuthentication({ userToken: data.userToken, encryptionKey: data.encryptionKey });
            
            sdk.execute(data.challengeId, async (err, result) => {
              if (err) {
                console.error("PIN setup challenge failed:", err);
                showNotification(`PIN Setup failed: ${err.message || 'Challenge incomplete'}`, 'error');
                setIsLoggingIn(false);
                return;
              }

              // Challenge complete (wallet successfully created on-chain!)
              await fetchUserWallets(data.userToken, loginEmailInput, true);
            });
          } else {
            // User already has a wallet connected
            await fetchUserWallets(data.userToken, loginEmailInput, false);
          }
        } catch (e) {
          showNotification(`Circle Login failed: ${e.message}`, 'error');
          setIsLoggingIn(false);
        }
      };

      // Handle Social Google Login challenge
      const handleCircleGoogleLogin = async () => {
        setIsLoggingIn(true);
        try {
          const res = await fetch(`${API_URL}/auth/social`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider: 'google' })
          });

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || 'Failed to initialize Google login session');
          }

          const data = await res.json();
          showNotification('◑ Opening Google OAuth authentication Challenge...');

          // Simulation fallback or real execution using Web SDK
          const W3SSdkRunner = window.W3SSdk || CustomW3SSdkFallback;
          const sdk = new W3SSdkRunner({ configs: { appSettings: { appId: data.appId } } });
          sdk.setAuthentication({ userToken: data.userToken, encryptionKey: data.encryptionKey });

          // In standard social flows, if challenge is completed on social redirect:
          setTimeout(async () => {
            await fetchUserWallets(data.userToken, 'google-user@submanager.io', false);
          }, 1500);
        } catch (e) {
          showNotification(`Google Auth failed: ${e.message}`, 'error');
          setIsLoggingIn(false);
        }
      };

      // Retrieve wallets post-auth/challenge
      const fetchUserWallets = async (userToken, identifier, isNewWallet = false) => {
        try {
          const res = await fetch(`${API_URL}/auth/wallets`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userToken })
          });

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || 'Failed to fetch user wallets');
          }

          const wallets = await res.json();
          if (wallets.length === 0) {
            throw new Error('No user wallets returned');
          }

          const walletAddress = wallets[0].address;
          const sessionUser = {
            email: identifier,
            userToken,
            walletAddress,
            userId: identifier
          };

          // Session Persistence using sessionStorage
          setCircleUser(sessionUser);
          sessionStorage.setItem('submanager_circle_user', JSON.stringify(sessionUser));
          setShowLoginModal(false);
          setLoginEmailInput('');

          } else {
            showNotification(`Welcome back! Circle wallet successfully reconnected.`);
          }
        } catch (e) {
          showNotification(`Failed to retrieve Circle wallet details: ${e.message}`, 'error');

          setIsLoggingIn(false);
        }

                          jobs.map((job, idx) => (
                            <tr key={idx} className="border-b border-gray-900 hover:bg-gray-900/30 transition-colors">
                              <td className="px-6 py-4 font-mono font-medium text-white">#{job.jobId}</td>
                              <td className="px-6 py-4 font-bold text-white uppercase tracking-wide">{job.serviceName}</td>
                              <td className="px-6 py-4 font-mono text-xs">
                                <a href={`https://testnet.arcscan.app/tx/${job.txHash}`} target="_blank" className="text-arc hover:underline">
                                  {truncateAddress(job.txHash)}
                                </a>
                              </td>
                              <td className="px-6 py-4">
                                <span className={`px-2 py-1 rounded text-[10px] font-bold tracking-wider uppercase ${
                                  job.status === 'Completed' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'
                                }`}>
                                  {job.status}
                                </span>
                              </td>
                              <td className="px-6 py-4">
                                <span className={`text-xs ${
                                  job.reason === 'Cancellation Verified' ? 'text-arc font-semibold' : 'text-gray-500 font-mono'
                                }`}>
                                  {job.reason}
                                </span>
                              </td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </section>

            </div>
          </div>

          {/* Reputation section at bottom */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div className="lg:col-span-3">
              <div className="glass-card rounded-2xl p-6 shadow-2xl flex flex-col md:flex-row items-center justify-between border-t-2 border-t-arc/40 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-64 h-64 bg-arc/5 rounded-full blur-3xl pointer-events-none"></div>
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 rounded-xl bg-arc/10 flex items-center justify-center border border-arc/20 shadow-[0_0_15px_rgba(0,209,255,0.1)]">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-7 w-7 text-arc" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
                    </svg>
                  </div>
                  <div>
                    <h3 className="text-lg font-bold text-white font-semibold">SubManager Agent Reputation</h3>
                    <p className="text-xs text-gray-400 font-mono mt-0.5">ERC-8004 Rating Registry Log</p>
                  </div>
                </div>

                <div className="mt-4 md:mt-0 flex items-center gap-6">
                  {!reputation ? (
                    <div className="animate-pulse flex items-center gap-3">
                      <div className="h-10 bg-gray-800 rounded w-16"></div>
                      <div className="h-6 bg-gray-800 rounded w-28"></div>
                    </div>
                  ) : (
                    <div className="flex items-center gap-6">
                      <div className="text-right">
                        <span className="text-[10px] uppercase text-gray-500 font-bold block">Dynamic Rating Score</span>
                        <span className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-arc to-blue-400 drop-shadow-[0_0_10px_rgba(0,209,255,0.3)]">
                          {reputation.score}/100
                        </span>
                      </div>
                      <div className="bg-gray-900/60 rounded-lg py-2 px-4 border border-gray-800">
                        <span className="text-[9px] uppercase text-gray-500 font-bold block mb-0.5">Feedback Event Tag</span>
                        <span className="text-xs font-mono text-arc font-semibold">{reputation.tag}</span>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Circle Social & Email Auth Modal */}
          {showLoginModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4 animate-fade-in">
              <div className="glass-card rounded-2xl p-6 max-w-sm w-full space-y-4">
                
                {/* Modal Title & Close Button */}
                <div className="flex justify-between items-center border-b border-white/10 pb-3">
                  <h3 className="text-lg font-bold text-white flex items-center gap-2">
                    <span className="text-arc text-base font-bold">◑</span> Sign in with Circle
                  </h3>
                  <button onClick={() => setShowLoginModal(false)} className="text-gray-400 hover:text-white font-bold text-xl font-mono">×</button>
                </div>

                {/* Tab selectors */}
                <div className="flex bg-gray-950/50 p-1 rounded-lg border border-white/5">
                  <button 
                    onClick={() => setActiveTab('email')}
                    className={`flex-1 text-center py-1.5 text-xs font-bold rounded-md transition-all ${activeTab === 'email' ? 'bg-arc text-slate-950' : 'text-gray-400 hover:text-white'}`}
                  >
                    Email
                  </button>
                  
                  {showGoogleTab && (
                    <button 
                      onClick={() => setActiveTab('google')}
                      className={`flex-1 text-center py-1.5 text-xs font-bold rounded-md transition-all ${activeTab === 'google' ? 'bg-arc text-slate-950' : 'text-gray-400 hover:text-white'}`}
                    >
                      Google
                    </button>
                  )}

                  <button 
                    onClick={() => setActiveTab('new')}
                    className={`flex-1 text-center py-1.5 text-xs font-bold rounded-md transition-all ${activeTab === 'new' ? 'bg-arc text-slate-950' : 'text-gray-400 hover:text-white'}`}
                  >
                    New user?
                  </button>
                </div>

                {/* Modal Contents based on selected Tab */}
                {activeTab === 'email' && (
                  <form onSubmit={handleCircleEmailLogin} className="space-y-4 pt-1">
                    <p className="text-[11px] text-gray-400 leading-relaxed">
                      Enter your email to verify your identity or configure your secure user-controlled MPC wallet.
                    </p>
                    <div>
                      <label className="text-[10px] uppercase text-gray-400 font-bold block mb-1">Email Address</label>
                      <input 
                        type="email" 
                        placeholder="you@example.com" 
                        value={loginEmailInput}
                        onChange={e => setLoginEmailInput(e.target.value)}
                        required
                        disabled={isLoggingIn}
                        className="w-full glass-input rounded-lg px-3 py-2 text-sm font-medium"
                      />
                    </div>
                    <div className="flex gap-2 justify-end pt-2">
                      <button 
                        type="button"
                        onClick={() => setShowLoginModal(false)}
                        disabled={isLoggingIn}
                        className="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-2 rounded font-bold transition-all"
                      >
                        Cancel
                      </button>
                      <button 
                        type="submit"
                        disabled={isLoggingIn}
                        className="text-xs bg-arc hover:bg-arcDark disabled:opacity-50 text-slate-950 px-4 py-2 rounded font-extrabold flex items-center gap-1.5 transition-all shadow-[0_0_10px_rgba(0,209,255,0.2)]"
                      >
                        {isLoggingIn ? (
                          <>
                            <span className="animate-spin inline-block w-3.5 h-3.5 border-2 border-slate-950 border-t-transparent rounded-full"></span>
                            Continuing...
                          </>
                        ) : 'Continue'}
                      </button>
                    </div>
                  </form>
                )}

                {activeTab === 'google' && (
                  <div className="space-y-4 pt-1">
                    <p className="text-[11px] text-gray-400 leading-relaxed">
                      Authenticate instantly using your Google account to access your user-controlled wallets securely.
                    </p>
                    <button
                      onClick={handleCircleGoogleLogin}
                      disabled={isLoggingIn}
                      className="w-full bg-[#152347] hover:bg-[#1e3264] border border-white/10 text-white py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2.5 transition-all disabled:opacity-50"
                    >
                      {isLoggingIn ? (
                        <>
                          <span className="animate-spin inline-block w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full"></span>
                          Logging In...
                        </>
                      ) : (
                        <>
                          <span className="font-bold text-red-400">G</span> Continue with Google
                        </>
                      )}
                    </button>
                  </div>
                )}

                {activeTab === 'new' && (
                  <div className="space-y-4 pt-1">
                    <p className="text-xs text-gray-300 leading-relaxed">
                      Circle auto-creates a secure, user-controlled cryptographic wallet directly on the Arc Testnet when you register with your email or social accounts.
                    </p>
                    <div className="bg-arc/5 border border-arc/20 rounded-lg p-3 text-xs leading-relaxed text-gray-300">
                      💡 Need test USDC? Once logged in, copy your new address and fund it using the faucet!
                    </div>
                    <a 
                      href="https://faucet.circle.com" 
                      target="_blank" 
                      className="text-xs text-arc hover:underline font-extrabold block text-center mt-2"
                    >
                      Visit Circle Faucet ↗
                    </a>
                  </div>
                )}

              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
