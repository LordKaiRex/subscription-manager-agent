<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Dashboard</title>
  
  <!-- Tailwind CSS v3 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 209, 255, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(0, 209, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 209, 255, 0); }
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { arc: '#00D1FF' }
        }
      }
    }
  </script>
</head>
<body class="antialiased min-h-screen flex flex-col items-center py-10 px-4">
  <div id="root" class="w-full max-w-5xl"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Configuration
    const AGENTIC_COMMERCE_ADDRESS = '0x0747EEf0706327138c69792bF28Cd525089e4583';
    const REPUTATION_REGISTRY_ADDRESS = '0x8004B663056A597Dffe9eCcC1965A193B7388713';
    const RPC_URL = 'https://rpc.testnet.arc.network';
    const AGENT_ID = '1';
    const OWNER_ADDRESS = '0x6e6B69D686E61Cc8b851C8e3721dF9C6Ef002DD0';

    // Mock Data
    const MOCK_SUBSCRIPTIONS = [
      { id: 'sub-1', name: 'Netflix', cost: 15.99, renewalDate: new Date(Date.now() + 2 * 86400000) },
      { id: 'sub-2', name: 'ChatGPT', cost: 20.00, renewalDate: new Date(Date.now() + 5 * 86400000) },
      { id: 'sub-3', name: 'Spotify', cost: 9.99, renewalDate: new Date(Date.now() + 10 * 86400000) },
    ];

    // Helper: Hex to readable ASCII string (ignores null padding)
    const hexToString = (hex) => {
      let str = '';
      for (let i = 0; i < hex.length; i += 2) {
        const code = parseInt(hex.substring(i, i + 2), 16);
        if (code > 31 && code < 127) str += String.fromCharCode(code);
      }
      return str.trim();
    };

    const truncateAddress = (addr) => `${addr.substring(0, 6)}...${addr.substring(addr.length - 4)}`;

    function App() {
      const [jobs, setJobs] = useState(null);
      const [reputation, setReputation] = useState(null);

      // Helper: Chunked JSON-RPC Logs fetcher to bypass 10,000 block RPC limit
      const fetchLogsChunked = async (address, topics) => {
        try {
          const blockRes = await fetch(RPC_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ jsonrpc: '2.0', method: 'eth_blockNumber', params: [], id: 1 })
          });
          const blockData = await blockRes.json();
          const latestBlock = parseInt(blockData.result, 16);

          const CHUNK_SIZE = 9999;
          const allLogs = [];
          const reqs = [];

          // Scan the last 1,000,000 blocks to guarantee catching all recent agent history
          let startBlock = latestBlock - 1000000;
          if (startBlock < 0) startBlock = 0;

          for (let from = startBlock; from <= latestBlock; from += CHUNK_SIZE + 1) {
            let to = from + CHUNK_SIZE;
            if (to > latestBlock) to = latestBlock;
            reqs.push({ fromHex: '0x' + from.toString(16), toHex: '0x' + to.toString(16) });
          }

          // Execute in parallel batches of 25 for fast speed
          for (let i = 0; i < reqs.length; i += 25) {
            const batch = reqs.slice(i, i + 25);
            const results = await Promise.all(batch.map(req => 
              fetch(RPC_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  jsonrpc: '2.0',
                  method: 'eth_getLogs',
                  params: [{ address, topics, fromBlock: req.fromHex, toBlock: req.toHex }],
                  id: 1
                })
              }).then(r => r.json())
            ));
            
            for (const data of results) {
              if (data.result && Array.isArray(data.result)) {
                allLogs.push(...data.result);
              }
            }
          }
          return allLogs;
        } catch (e) {
          console.error("fetchLogsChunked failed:", e);
          return [];
        }
      };

      const loadData = async () => {
        try {
          // Original correct topics for Arc Testnet
          const TOPIC_JOB_CREATED = '0xb0f0239bfdd96453e24733e18bfc24b70d8fadf123dd977473518dd577ee79b9';
          const TOPIC_JOB_COMPLETED = '0x869e2577b006bf47ee981cf6fec2e25583548081c14b98deab587f77b5068038';
          const TOPIC_FEEDBACK_GIVEN = '0x6a4a61743519c9d648a14e6493f47dbe3ff1aa29e7785c96c8326a205e58febc';

          // 1. Fetch Jobs
          const createdLogs = await fetchLogsChunked(AGENTIC_COMMERCE_ADDRESS, [TOPIC_JOB_CREATED]);
          const completedLogs = await fetchLogsChunked(AGENTIC_COMMERCE_ADDRESS, [TOPIC_JOB_COMPLETED]);
          
          const parsedJobs = createdLogs.map(log => {
            const jobIdHex = log.topics[1];
            const jobId = parseInt(jobIdHex, 16);
            
            const completedLog = completedLogs.find(cl => parseInt(cl.topics[1], 16) === jobId);
            let status = 'Active / Pending';
            let reason = '-';
            if (completedLog) {
              status = 'Completed';
              // Decode reason from non-indexed data
              reason = hexToString(completedLog.data.substring(2));
            }

            return {
              jobId,
              txHash: log.transactionHash, // Restored the real TX hashes!
              status,
              reason
            };
          }).reverse();
          
          setJobs(parsedJobs);

          // 2. Fetch Reputation
          const agentIdHex = '0x' + parseInt(AGENT_ID).toString(16).padStart(64, '0');
          const feedbackLogs = await fetchLogsChunked(REPUTATION_REGISTRY_ADDRESS, [TOPIC_FEEDBACK_GIVEN, agentIdHex]);
          
          if (feedbackLogs.length > 0) {
            const latest = feedbackLogs[feedbackLogs.length - 1];
            const resData = latest.data.substring(2);
            // score is index 1 (bytes 32-64, hex 64-128)
            const score = parseInt(resData.substring(64, 128), 16);
            
            // tag is string at index 6 (offset at bytes 192-224, hex 384-448)
            const tagOffsetBytes = parseInt(resData.substring(384, 448), 16);
            const tagOffset = tagOffsetBytes * 2;
            const tagLenBytes = parseInt(resData.substring(tagOffset, tagOffset + 64), 16);
            const tagHex = resData.substring(tagOffset + 64, tagOffset + 64 + tagLenBytes * 2);
            const tag = hexToString(tagHex);
            
            setReputation({ score, tag });
          } else {
            setReputation({ score: 0, tag: 'No feedback yet' });
          }
        } catch (e) {
          console.error("Error fetching on-chain data:", e);
        }
      };

      useEffect(() => {
        loadData();
        const interval = setInterval(loadData, 30000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="space-y-8 animate-fade-in">
          
          {/* Header */}
          <header className="glass-card rounded-2xl p-6 flex flex-col md:flex-row items-center justify-between shadow-2xl">
            <div>
              <h1 className="text-3xl font-bold tracking-tight text-white flex items-center gap-3">
                Subscription Manager <span className="text-arc text-lg bg-arc/10 px-3 py-1 rounded-full border border-arc/20">Agent ID: {AGENT_ID}</span>
              </h1>
              <p className="text-gray-400 mt-2 font-mono text-sm">Owner: {truncateAddress(OWNER_ADDRESS)}</p>
            </div>
            <div className="mt-4 md:mt-0 flex items-center gap-3 bg-gray-800/80 px-4 py-2 rounded-full border border-gray-700">
              <div className="w-3 h-3 rounded-full bg-arc pulse-dot"></div>
              <span className="text-sm font-semibold text-gray-200">Live on Arc Testnet</span>
            </div>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            {/* Main Content (Subscriptions & Jobs) */}
            <div className="lg:col-span-2 space-y-8">
              
              {/* Subscriptions Grid */}
              <section>
                <h2 className="text-xl font-semibold mb-4 text-gray-300">Monitored Subscriptions</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {MOCK_SUBSCRIPTIONS.map(sub => {
                    const daysLeft = Math.ceil((sub.renewalDate - new Date()) / 86400000);
                    const isUrgent = daysLeft <= 7;
                    return (
                      <div key={sub.id} className="glass-card rounded-xl p-5 relative overflow-hidden group hover:border-arc/50 transition-colors">
                        <div className="flex justify-between items-start mb-2">
                          <h3 className="text-xl font-bold">{sub.name}</h3>
                          <span className="text-lg font-medium text-green-400">${sub.cost.toFixed(2)}</span>
                        </div>
                        <p className="text-gray-400 text-sm mb-4">Renews: {sub.renewalDate.toLocaleDateString()}</p>
                        
                        <div className="flex items-center justify-between">
                          <span className="text-xs text-gray-500 uppercase tracking-wider font-semibold">Status</span>
                          {isUrgent ? (
                            <span className="bg-red-500/20 text-red-400 border border-red-500/30 px-2 py-1 rounded-md text-xs font-bold shadow-[0_0_10px_rgba(239,68,68,0.2)]">
                              {daysLeft} Days Left
                            </span>
                          ) : (
                            <span className="bg-blue-500/20 text-blue-400 border border-blue-500/30 px-2 py-1 rounded-md text-xs font-bold">
                              {daysLeft} Days Left
                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </section>

              {/* Job History */}
              <section>
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-xl font-semibold text-gray-300">On-Chain Job History</h2>
                  {jobs && <span className="text-xs text-gray-500">Auto-refreshes every 30s</span>}
                </div>
                <div className="glass-card rounded-xl overflow-hidden">
                  <table className="w-full text-left text-sm text-gray-400">
                    <thead className="text-xs uppercase bg-gray-800/50 text-gray-400 border-b border-gray-700">
                      <tr>
                        <th className="px-6 py-4">Job ID</th>
                        <th className="px-6 py-4">Transaction</th>
                        <th className="px-6 py-4">Status</th>
                        <th className="px-6 py-4">Reason</th>
                      </tr>
                    </thead>
                    <tbody>
                      {!jobs ? (
                        <tr>
                          <td colSpan="4" className="px-6 py-8 text-center">
                            <div className="animate-pulse flex flex-col items-center space-y-2">
                              <div className="h-4 bg-gray-700 rounded w-1/4"></div>
                              <div className="text-xs text-gray-500">Syncing with Arc Testnet...</div>
                            </div>
                          </td>
                        </tr>
                      ) : jobs.length === 0 ? (
                        <tr>
                          <td colSpan="4" className="px-6 py-8 text-center text-gray-500">No jobs created yet.</td>
                        </tr>
                      ) : (
                        jobs.map((job, idx) => (
                          <tr key={idx} className="border-b border-gray-800 hover:bg-gray-800/30 transition-colors">
                            <td className="px-6 py-4 font-mono font-medium text-white">{job.jobId}</td>
                            <td className="px-6 py-4 font-mono">
                              <a href={`https://testnet.arcscan.app/tx/${job.txHash}`} target="_blank" className="text-arc hover:underline">
                                {truncateAddress(job.txHash)}
                              </a>
                            </td>
                            <td className="px-6 py-4">
                              <span className={`px-2 py-1 rounded-md text-xs font-semibold ${
                                job.status === 'Completed' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'
                              }`}>
                                {job.status}
                              </span>
                            </td>
                            <td className="px-6 py-4 italic truncate max-w-[150px]">{job.reason}</td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </section>

            </div>

            {/* Right Sidebar (Reputation Panel) */}
            <div className="lg:col-span-1">
              <div className="glass-card rounded-2xl p-6 sticky top-10 flex flex-col items-center text-center shadow-[0_0_30px_rgba(0,209,255,0.05)] border-t-2 border-t-arc/40">
                <div className="w-16 h-16 rounded-2xl bg-arc/20 flex items-center justify-center mb-4 border border-arc/40">
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8 text-arc" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
                  </svg>
                </div>
                <h3 className="text-xl font-bold text-white mb-1">Agent Reputation</h3>
                <p className="text-sm text-gray-400 mb-6">ERC-8004 Registry</p>

                {!reputation ? (
                  <div className="animate-pulse space-y-4 w-full">
                    <div className="h-16 bg-gray-800 rounded-lg mx-auto w-24"></div>
                    <div className="h-4 bg-gray-800 rounded mx-auto w-3/4"></div>
                  </div>
                ) : (
                  <div className="w-full">
                    <div className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-arc to-blue-500 mb-4 drop-shadow-[0_0_15px_rgba(0,209,255,0.4)]">
                      {reputation.score}
                    </div>
                    <div className="bg-gray-800/50 rounded-lg p-3 border border-gray-700/50">
                      <span className="text-xs uppercase text-gray-500 font-semibold tracking-wider block mb-1">Latest Tag</span>
                      <span className="text-sm font-mono text-gray-300 bg-gray-900 px-2 py-1 rounded inline-block">
                        {reputation.tag}
                      </span>
                    </div>
                  </div>
                )}
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
